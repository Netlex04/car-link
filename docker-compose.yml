services:
  postgres-registration:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: registration
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d registration"]
      interval: 5s
      timeout: 3s
      retries: 20

  registration-service:
    build: ./services/registration-service
    ports: ["3000:3000"]
    environment:
      DB_HOST: postgres-registration
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: registration
    depends_on:
      postgres-registration:
        condition: service_healthy

  postgres-meet:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: meet
    ports: ["5433:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meet"]
      interval: 5s
      timeout: 3s
      retries: 20

  meet-service:
    build: ./services/meet-service
    ports: ["3001:3001"]
    environment:
      DB_HOST: postgres-meet
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: meet
    depends_on:
      postgres-meet:
        condition: service_healthy

volumes:
  pgdata:
