services:
  postgres-registration:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: registration
    ports: ["5432:5432"]
    volumes:
      - pgdata-registration:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d registration"]
      interval: 5s
      timeout: 3s
      retries: 20

  registration-service:
    build: ./services/registration-service
    ports: ["3001:3001"]
    environment:
      DB_HOST: postgres-registration
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: registration
      MQTT_BROKER: mqtt://mqtt-broker:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
    depends_on:
      postgres-registration:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-meet:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: meet
    ports: ["5433:5432"]
    volumes:
      - pgdata-meet:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meet"]
      interval: 5s
      timeout: 3s
      retries: 20

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  meet-service:
    build: ./services/meet-service
    ports: ["3000:3000"]
    environment:
      DB_HOST: postgres-meet
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: meet
      MQTT_BROKER: mqtt://mqtt-broker:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
    depends_on:
      postgres-meet:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      API_GATEWAY_BEARER_TOKEN: "changeme123"
      MEET_SERVICE_URL: "http://meet-service:3000"
      REGISTRATION_SERVICE_URL: "http://registration-service:3001"
    depends_on:
      meet-service:
        condition: service_healthy
      registration-service:
        condition: service_healthy

volumes:
  pgdata-registration:
  pgdata-meet:
  mosquitto-data:
  mosquitto-log:
