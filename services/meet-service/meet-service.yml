openapi: 3.1.0
info:
  title: CarMeet Meet-Service API
  version: 1.0.0
servers:
  - url: http://localhost:3000
tags:
  - name: Venues
  - name: Meets

paths:
  /venues:
    get:
      tags: [Venues]
      summary: List venues
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"
    post:
      tags: [Venues]
      summary: Create a venue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenueCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "400":
          $ref: "#/components/responses/BadRequest"

  /venues/{venueId}:
    get:
      tags: [Venues]
      summary: Get a venue by id
      parameters:
        - $ref: "#/components/parameters/VenueId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Venues]
      summary: Update venue
      parameters:
        - $ref: "#/components/parameters/VenueId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenueUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Venues]
      summary: Delete venue
      parameters:
        - $ref: "#/components/parameters/VenueId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Venue is still used by one or more meets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /meets:
    get:
      tags: [Meets]
      summary: List meets (optionally filtered)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PLANNED, CANCELLED, DONE]
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MeetResponse"
    post:
      tags: [Meets]
      summary: Create a meet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /meets/{meetId}:
    get:
      tags: [Meets]
      summary: Get meet by id
      parameters:
        - $ref: "#/components/parameters/MeetId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Meets]
      summary: Update meet (replace editable fields)
      parameters:
        - $ref: "#/components/parameters/MeetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Meets]
      summary: Cancel a meet (soft delete)
      parameters:
        - $ref: "#/components/parameters/MeetId"
      responses:
        "200":
          description: Cancelled (status=CANCELLED)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Meets]
      summary: Delete a meet
      parameters:
        - $ref: "#/components/parameters/MeetId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    MeetId:
      name: meetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VenueId:
      name: venueId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string
        details:
          type: string

    Venue:
      type: object
      additionalProperties: false
      required: [venueId, name, city, country]
      properties:
        venueId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        street:
          type: string
        zip:
          type: string
        city:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 1
        latitude:
          type: number
        longitude:
          type: number
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    VenueSummary:
      type: object
      additionalProperties: false
      required: [venueId, name, city, country]
      properties:
        name:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 1

    VenueCreate:
      type: object
      additionalProperties: false
      required: [name, city, country]
      properties:
        name:
          type: string
          minLength: 1
        street:
          type: string
        zip:
          type: string
        city:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 1
        latitude:
          type: number
        longitude:
          type: number
        notes:
          type: string

    VenueUpdate:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        street:
          type: string
        zip:
          type: string
        city:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 1
        latitude:
          type: number
        longitude:
          type: number
        notes:
          type: string

    Meet:
      type: object
      additionalProperties: false
      required:
        - meetId
        - title
        - startAt
        - status
        - venueIdx
        - organizerUserId
        - createdAt
      properties:
        meetId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        description:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [PLANNED, CANCELLED, DONE]
        venueId:
          type: string
          format: uuid
        organizerUserId:
          type: string
          format: uuid
          description: UserId from Registration-Service (no DB FK here)
        maxParticipants:
          type: integer
          minimum: 0
        maxVisitors:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time

    MeetResponse:
      allOf:
        - $ref: "#/components/schemas/Meet"
        - type: object
          additionalProperties: false
          required: [venue]
          properties:
            venue:
              $ref: "#/components/schemas/VenueSummary"

    MeetCreate:
      type: object
      additionalProperties: false
      required: [title, startAt, venueId, organizerUserId]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        venueId:
          type: string
          format: uuid
        organizerUserId:
          type: string
          format: uuid
        maxParticipants:
          type: integer
          minimum: 0
        maxVisitors:
          type: integer
          minimum: 0

    MeetUpdate:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [PLANNED, CANCELLED, DONE]
        venueId:
          type: string
          format: uuid
        maxParticipants:
          type: integer
          minimum: 0
        maxVisitors:
          type: integer
          minimum: 0
